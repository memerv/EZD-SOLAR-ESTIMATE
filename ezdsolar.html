<style>
  :root {
    --pea-primary: #9b2077; 
    --pea-light: #fdf2f8; 
    --pea-border: #fce7f3;
    --ezd-p: #8b2379; 
    --ezd-b: #329fe3; 
    --ezd-g: #81bc41; 
    --ink: #1f2933;
    --teal: #0e9f6e;
  }
  body {
    font-family: 'Prompt', sans-serif; 
    background: #fcf9fb; 
    color: var(--ink);
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 10px 30px -12px rgba(155, 32, 119, 0.15); 
    border-top: 4px solid var(--pea-primary); 
  }
  .fade { animation: f .28s ease both; }
  @keyframes f { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }
  
  .opt { transition: transform .12s, border-color .12s, background .12s, box-shadow .12s; }
  .opt:hover { transform: translateY(-2px); border-color: var(--pea-primary); background: var(--pea-light); box-shadow: 0 4px 12px rgba(155,32,119,0.08); }
  .opt:active { transform: scale(.99); }
  .opt:focus-visible { outline: 3px solid #f9a8d4; outline-offset: 2px; }
  
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  @media (prefers-reduced-motion: reduce) { .fade { animation: none } .opt { transition: none } }
  
  .logo-text-outline {
    text-shadow: 
      3px 3px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff,
      4px 4px 5px rgba(0,0,0,0.05);

</style>
</head>
<body class="min-h-screen flex items-start sm:items-center justify-center p-4">

<div class="w-full max-w-xl mt-4 sm:mt-0">
  <div class="flex flex-col items-center text-center mb-6 px-1 fade">

          </span>
      </div>
      <div class="font-bold text-[24px] leading-none flex gap-1 tracking-tighter mt-2" style="font-family: Arial, Helvetica, sans-serif;">

    </div>
  </div>

      </div>
      <p id="step-text" class="text-[11px] text-gray-400 mt-2 font-medium">เริ่มต้น</p>
    </div>

    <h2 id="q-title" class="text-lg font-semibold leading-relaxed mb-1">กำลังโหลด…</h2>

      </summary>
      <p id="q-why" class="text-xs text-gray-600 bg-[#fdf2f8] border border-[#fce7f3] rounded-xl p-3 mt-2 leading-relaxed"></p>
    </details>

    <div id="answers" class="space-y-2.5"></div>
    <button id="next" class="hidden mt-5 w-full text-white font-semibold py-3 rounded-xl shadow-md" style="background: var(--pea-primary);">ถัดไป ➔</button>
  </div>

  <p class="text-[11px] text-gray-400 text-center mt-4 px-4 leading-relaxed">

  </p>
</div>

function getVal(row, ...searchStrs) {
   for(let searchStr of searchStrs) {
       const cleanSearch = searchStr.toLowerCase().replace(/\s+/g, '');
       for(let k in row) {
           const cleanKey = k.toLowerCase().replace(/\s+/g, '');
           if(cleanKey === cleanSearch) return row[k];
       }
       for(let k in row) {
           const cleanKey = k.toLowerCase().replace(/\s+/g, '');
           if(cleanKey.includes(cleanSearch)) return row[k];
       }
   }
   return "-";
}

function parseNum(val) {
    if (val === undefined || val === null || val === '' || val === '-') return NaN;
    return parseFloat(val.toString().replace(/,/g, ''));
}

Papa.parse(rawCSV, {
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        excelData = results.data;
    }
});

function renderPkgCard(pkg, title, hexColor) {
  if(!pkg) return '';
  
  const id = getVal(pkg, 'packid', 'packagecode');
  const inv = getVal(pkg, 'inverterbrand', 'inverter');
  const panel = getVal(pkg, 'solarpanel(brand)', 'แผง');
  const bat = getVal(pkg, 'batterybrand', 'battery');
  
  const panelWp = getVal(pkg, 'solarpanel(wp)');
  const panelQty = getVal(pkg, 'solarpanel(qty)');
  const panelTotalWp = getVal(pkg, 'q2solarpaneltotal(wp)', 'totalwp', 'total');
  const invKw = getVal(pkg, 'inverter(kw)');
  const batKwh = getVal(pkg, 'battery(kwh)');
  const areaSqM = getVal(pkg, 'พื้นที่ติดตั้งpanel(ตารางเมตร)', 'พื้นที่ติดตั้ง');
  
  const priceRaw = getVal(pkg, 'catalogprice(vat)', 'proprice', 'price');
  const pNum = parseNum(priceRaw);
  const price = !isNaN(pNum) ? pNum.toLocaleString() : (priceRaw !== '-' ? priceRaw : 'สอบถามราคา');
  
  const saveRaw = getVal(pkg, 'ผลประหยัดต่อเดือน');
  const sNum = parseNum(saveRaw);
  const save = !isNaN(sNum) ? sNum.toLocaleString() : (saveRaw !== '-' ? saveRaw : '-');
  
  const paybackRaw = getVal(pkg, 'ระยะเวลาคืนทุน');
  const pbNum = parseNum(paybackRaw);
  const payback = !isNaN(pbNum) ? pbNum.toFixed(1) : (paybackRaw !== '-' ? paybackRaw : '-');
  
  const kwRaw = getVal(pkg, 'inverter(kw)');
  const kwNum = parseNum(kwRaw);
  const kw = !isNaN(kwNum) ? kwNum : kwRaw;

  return `
    <div class="rounded-2xl p-4 bg-white shadow-sm relative overflow-hidden mt-3" style="border: 2px solid ${hexColor}">
      <div class="absolute top-0 right-0 text-white text-[11px] font-bold px-3 py-1 rounded-bl-xl" style="background-color: ${hexColor}">${title}</div>
      <div class="flex items-center justify-between mb-3 mt-1">
        <div>
           <span class="text-[11px] font-semibold text-gray-400">รหัสแพ็กเกจ: ${id}</span>
           <h3 class="text-xl font-extrabold text-gray-800 leading-none mt-1">${kw} kW</h3>
        </div>
        <div class="text-right">
           <div class="text-[10px] text-gray-500 mb-0.5">ราคาประเมิน (บาท)</div>
           <div class="text-lg font-black" style="color: ${hexColor}">${price}</div>
        </div>
      </div>
      
      <div class="bg-gray-50 rounded-xl p-3 text-[12px] grid grid-cols-2 gap-2 mb-3 border border-gray-100">
         <div><span class="text-gray-400 text-[10px] block uppercase tracking-wide mb-0.5">แผงโซลาร์เซลล์</span>
             <span class="font-bold text-gray-700 text-[13px]">${panelTotalWp} W</span>
             <div class="text-[10px] text-gray-500 mt-0.5">${panelQty} แผง (${panelWp}W) - ${panel}</div>
         </div>
         <div><span class="text-gray-400 text-[10px] block uppercase tracking-wide mb-0.5">อินเวอร์เตอร์</span>
             <span class="font-bold text-gray-700 text-[13px]">${invKw} kW</span>
             <div class="text-[10px] text-gray-500 mt-0.5">${inv}</div>
         </div>
         <div><span class="text-gray-400 text-[10px] block uppercase tracking-wide mb-0.5">พื้นที่หลังคาที่ใช้</span>
             <span class="font-bold text-gray-700 text-[13px]">${areaSqM} ตร.ม.</span>
         </div>
         ${(batKwh && batKwh !== '-' && batKwh !== '') ? `<div><span class="text-gray-400 text-[10px] block uppercase tracking-wide mb-0.5">แบตเตอรี่</span>
             <span class="font-bold text-gray-700 text-[13px]">${batKwh} kWh</span>
             <div class="text-[10px] text-gray-500 mt-0.5">${bat}</div>
         </div>` : '<div></div>'}
      </div>

      <div class="flex items-center justify-between px-3 py-2 rounded-xl text-[13px] font-semibold" style="background-color: #f8fafc; border: 1px solid #f1f5f9; color: ${hexColor}">
         <div class="flex items-center gap-1"><span>⚡</span> ประหยัด ~${save} บ./ด.</div>
         <div>คืนทุน ~${payback} ปี</div>
      </div>
    </div>
  `;
}

function renderSmallPkgCard(pkg) {
  const kwRaw = getVal(pkg, 'inverter(kw)');
  const kwNum = parseNum(kwRaw);
  const kw = !isNaN(kwNum) ? kwNum : kwRaw;

  const id = getVal(pkg, 'packid', 'packagecode');
  const type = getVal(pkg, 'type');
  const inv = getVal(pkg, 'inverterbrand');
  
  const panelQty = getVal(pkg, 'solarpanel(qty)');
  const areaSqM = getVal(pkg, 'พื้นที่ติดตั้งpanel(ตารางเมตร)', 'พื้นที่ติดตั้ง');
  
  const priceRaw = getVal(pkg, 'catalogprice(vat)', 'proprice', 'price');
  const pNum = parseNum(priceRaw);
  const price = !isNaN(pNum) ? pNum.toLocaleString() : priceRaw;

  const saveRaw = getVal(pkg, 'ผลประหยัดต่อเดือน');
  const sNum = parseNum(saveRaw);
  const save = !isNaN(sNum) ? sNum.toLocaleString() : (saveRaw !== '-' ? saveRaw : '-');
  
  const paybackRaw = getVal(pkg, 'ระยะเวลาคืนทุน');
  const pbNum = parseNum(paybackRaw);
  const payback = !isNaN(pbNum) ? pbNum.toFixed(1) : (paybackRaw !== '-' ? paybackRaw : '-');

  const isBat = (type.toUpperCase() === 'SB' || type.toUpperCase() === 'SH' || type.toUpperCase() === 'BB');
  
  return `
    <div class="bg-white border border-gray-200 p-3 rounded-xl flex flex-col transition-colors hover:border-[#9b2077]">
        <div class="flex justify-between items-start">
            <div>
                <div class="text-[10px] text-gray-400 font-mono leading-none">${id}</div>
                <div class="font-bold text-gray-800 text-sm flex items-center gap-2 mt-1">
                    ${kw} kW 
                    <span class="text-[10px] px-2 py-0.5 rounded-full ${isBat ? 'bg-teal-100 text-teal-700' : 'bg-gray-100 text-gray-600'}">${type}</span>
                </div>
                <div class="text-[11px] text-gray-500 mt-0.5">Inverter: ${inv} | ใช้พื้นที่: ${areaSqM} ตร.ม. | ${panelQty} แผง</div>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-gray-500 mb-0.5">ราคาประเมิน</div>
                <div class="font-bold" style="color: var(--pea-primary);">${price} ฿</div>
            </div>
        </div>
        <div class="flex items-center justify-between mt-2 pt-2 border-t border-gray-100 text-[11px] text-gray-600">
            <div class="flex items-center gap-1 font-medium"><span>⚡</span> ประหยัด ~${save} บ./ด.</div>
            <div class="font-medium">คืนทุน ~${payback} ปี</div>
        </div>
    </div>
  `;
}

let cur='segment';
function nextId(from){
  let i=ORDER.indexOf(from)+1;
  while(i<ORDER.length){const id=ORDER[i]; if(!(SKIP[id]&&SKIP[id]()))return id; i++;}
  return null;
}

function choiceBtn(o,key,id){
  const b=document.createElement('button');
  b.className='opt w-full text-left bg-white border-2 border-gray-200 rounded-2xl py-3.5 px-4 text-[15px] leading-snug';
  b.innerHTML=o.t;
  b.onclick=()=>{A[key]=o.v;go(nextId(id));};
  return b;
}

function render(id){
  cur=id;
  const q=build(id);
  const app=document.getElementById('app');
  app.classList.remove('fade');void app.offsetWidth;app.classList.add('fade');

  const total=A.seg?visList().length:9;
  const idx=A.seg?visList().indexOf(id)+1:ORDER.indexOf(id)+1;
  document.getElementById('bar').style.width=Math.min(100,idx/total*100)+'%';
  document.getElementById('step-text').innerText=`ข้อ ${idx} จาก ${total}`;
  document.getElementById('q-title').innerText=q.title;
  document.getElementById('q-why').innerText=q.why;
  document.getElementById('why-box').open=false;

  const area=document.getElementById('answers');
  const next=document.getElementById('next');
  area.innerHTML='';next.classList.add('hidden');

  if(q.type==='choice'){
    q.options.forEach(o=>area.appendChild(choiceBtn(o,q.key,id)));

  } else if(q.type==='demand'){
    const inp=document.createElement('input');
    inp.type='number';inp.inputMode='numeric';inp.placeholder='เช่น 3500 (บาท/เดือน)';
    inp.className='w-full border-2 border-gray-300 rounded-2xl px-4 py-3 text-xl text-center font-bold focus:outline-none focus:border-[#9b2077]';
    area.appendChild(inp);inp.focus();
    next.classList.remove('hidden');
    const sub=()=>{const v=parseFloat(inp.value);if(!v||v<=0){inp.classList.add('border-red-400');inp.focus();return;}A.bill=v;go(nextId(id));};
    next.onclick=sub;inp.addEventListener('keydown',e=>{if(e.key==='Enter')sub();});
    
    const link=document.createElement('button');
    link.className='w-full text-center text-xs underline pt-2';
    link.style.color='var(--pea-primary)';
    link.innerText='ไม่ทราบค่าไฟ? เลือกช่วงโดยประมาณ';
    link.onclick=()=>{
      area.innerHTML='';next.classList.add('hidden');
      q.ranges.forEach(r=>area.appendChild(choiceBtn({t:r[0],v:r[1]},'bill',id)));
    };
    area.appendChild(link);
  }
}
function go(id){id?render(id):calculate();}

function nearestPackage(kw){
  if(kw>500)return Math.round(kw/50)*50;
  if(kw>50)return Math.round(kw/10)*10;
  const std=[1.5,2,3,5,8,10,15,20,25,30,40,50];
  return std.reduce((b,s)=>Math.abs(s-kw)<Math.abs(b-kw)?s:b,std[0]);
}
function phaseCap(){
  if(PHASE_SKIP.includes(A.seg))return{cap:1e9,label:'3 เฟส/แรงสูง (ตามกำลังหม้อแปลง)'};
  let p=A.phase; if(p==='auto')p=(A.bill>5000)?'3':'1';
  if(p==='1')return{cap:5,label:'1 เฟส — เพดาน 5 kW'};
  if(A.seg==='home')return{cap:10,label:'3 เฟส (บ้าน) — เพดาน 10 kW'};
  return{cap:1e9,label:'3 เฟส เชิงพาณิชย์ (ตามกำลังหม้อแปลง)'};
}

function calculate(){
  const Em=A.bill/C.TARIFF;
  const away=A.daytime<=0.2, wantBackup=A.backup===true, battery=away||wantBackup;
  const targetFrac=battery?Math.min(0.9,A.daytime+0.4):A.daytime;
  const servedLoad=Em*targetFrac;
  const kwDemand=servedLoad/YIELD_MONTH;
  const A_PK=apk();
  const usableRoof=A.roof*A.obstacle;
  const kwRoof=usableRoof/A_PK;
  const ph=phaseCap();
  const cands=[
    {k:kwDemand,why:'ขนาดที่คุ้มกับค่าไฟ'},
    {k:kwRoof,  why:'พื้นที่รองรับ'},
    {k:ph.cap,  why:'เพดานระบบไฟ — '+ph.label}
  ];
  let bind=cands.reduce((b,c)=>c.k<b.k?c:b,cands[0]);
  let kw=bind.k; if(kw>0&&kw<1.5)kw=1.5;
  const kwShow=kw>=100?Math.round(kw):kw.toFixed(1);
  const pkg=nearestPackage(kw);
  const type=battery?'ไฮบริด + แบตเตอรี่':'ออนกริด (ลดค่าไฟกลางวัน)';
  const warn=[];

  if(wantBackup)warn.push(['🔋','#0e9f6e','#ecfdf5','คุณต้องการไฟสำรอง → แนะนำไฮบริด+แบต เพราะระบบออนกริดล้วนจะดับตามการไฟฟ้าเมื่อไฟดับ']);
  else if(away)warn.push(['🔋','#0e9f6e','#ecfdf5','กลางวันใช้ไฟน้อย → แนะนำเสริมแบตเก็บไฟไว้ใช้ตอนค่ำ/กลางคืน ไม่งั้นไฟส่วนใหญ่จะถูกขายคืนราคาถูก']);
  else if((A.meter==='tou'||(A.meter==='auto'&&A.bill>8000))&&A.daytime<=0.45)
    warn.push(['🔋','#2563eb','#eff6ff','ใช้/น่าจะใช้มิเตอร์ TOU + ใช้ไฟช่วงหัวค่ำเยอะ — เสริมแบตจะช่วยย้ายไฟไปใช้ช่วงค่ำ (ราคาแพง) ทำให้คุ้มขึ้น (ตัวเลือกเสริม)']);
  if(kwRoof<kwDemand-0.2)
    warn.push(['📐','#b45309','#fffbeb',`ตามค่าไฟ เหมาะกับ ~${kwDemand.toFixed(1)} kWp แต่พื้นที่รับได้สูงสุด ~${kwRoof.toFixed(1)} kWp จึงแนะนำเท่าที่พื้นที่ไหว`]);
  if(ph.cap<kwDemand-0.2&&ph.cap<kwRoof)
    warn.push(['⚡','#9333ea','#faf5ff',`ขนาดถูกจำกัดที่ ${ph.label} — ถ้าต้องการมากกว่านี้ ต้องอัปเกรดเป็น 3 เฟส หรือตรวจกำลังหม้อแปลงก่อน`]);
  if(A.weekend===true)
    warn.push(['🛑','#dc2626','#fef2f2','ปิดวันหยุด — ต้องติด Zero Export กันไฟย้อนตามกฎ และไฟวันหยุดจะไม่ถูกใช้ (พิจารณาแบต/ลดขนาด/ทำเรื่องขายไฟ)']);
  
  const gen=kw*YIELD_MONTH, selfUse=Math.min(gen,servedLoad);
  const save=Math.round(selfUse*C.TARIFF/100)*100;
  
  // ----- [ส่งข้อมูลเข้าระบบหลังบ้าน Firebase] -----
  if (window.saveToDatabase) {
      window.saveToDatabase({
          segment: SEG[A.seg].label,
          bill: A.bill,
          roofArea: A.roof,
          recommended_kW: kwShow,
          recommended_package: pkg,
          saving_per_month: save,
          date: new Date().toLocaleString('th-TH')
      });
  }
  // -------------------------------------------

  showResult({Em,targetFrac,servedLoad,kwDemand,usableRoof,kwRoof,A_PK,ph,kw,kwShow,pkg,type,warn,save,bindWhy:bind.why,battery});
}

function showResult(r){
  // เงื่อนไขสกรีนบ้านที่ไม่เหมาะสม
  if (A.seg === 'home' && (r.kwDemand < 1.5 || r.kwRoof < 1.5)) {
      document.getElementById('app').innerHTML = `
          <div class="fade text-center p-6">
            <div class="text-5xl mb-4">🏠</div>
            <h2 class="text-xl font-bold mb-2 text-red-600">บ้านของท่านยังไม่เหมาะกับการติดโซลาร์เซลล์</h2>
            <p class="text-sm text-gray-600 mb-6">
              เนื่องจาก${r.kwRoof < 1.5 ? 'พื้นที่หลังคาสำหรับติดตั้งมีจำกัด' : 'การใช้ไฟเฉลี่ยน้อยเกินไป'} 
              ทำให้การติดตั้งอาจไม่คุ้มทุนหรือยังไม่เข้าเกณฑ์แพ็กเกจมาตรฐาน
            </p>
            <div class="bg-[#fdf2f8] border border-[#fce7f3] rounded-xl p-4 text-sm text-gray-700 mb-6 shadow-sm">
               หากท่านต้องการข้อมูลเพิ่มเติม สามารถโทรสอบถามเจ้าหน้าที่ได้ที่<br>
               <b class="text-xl block mt-2" style="color: var(--pea-primary);">📞 1129 PEA Contact Center</b>
            </div>
            <button onclick="location.reload()" class="w-full text-white font-semibold py-3 rounded-xl shadow-md" style="background:var(--pea-primary)">↻ ประเมินใหม่</button>
          </div>
      `;
      return;
  }

  const warnHtml=r.warn.map(w=>`<div class="rounded-xl p-3 text-[13px] leading-relaxed" style="color:${w[1]};background:${w[2]}"><b>${w[0]}</b> ${w[3]}</div>`).join('');
  const fracTxt=r.battery?`${r.targetFrac.toFixed(2)} (มีแบต = เผื่อชาร์จใช้ตอนค่ำ ~80–90% ของการใช้ไฟ)`:`${A.daytime} (ไม่มีแบต = เฉพาะที่ใช้กลางวัน)`;

  let pkgHtml = "";
  let allPkgsHtml = "";
  
  if(excelData.length > 0) {
      let userPhase = '1';
      if(r.ph.cap >= 10 || A.phase === '3' || (A.phase === 'auto' && A.bill > 5000) || PHASE_SKIP.includes(A.seg)) {
          userPhase = '3';
      }
      
      let validPkgs = excelData.filter(p => {
          let kw = parseNum(getVal(p, 'inverter(kw)'));
          let ph = getVal(p, 'phase').toString();
          return !isNaN(kw) && ph.includes(userPhase) && kw <= r.kwRoof && kw <= r.ph.cap;
      });
      validPkgs.sort((a,b) => parseNum(getVal(a, 'inverter(kw)')) - parseNum(getVal(b, 'inverter(kw)')));

      if (validPkgs.length === 0) {
          pkgHtml = `
            <div class="mt-8 mb-4 border-t-2 border-dashed border-gray-200 pt-6">
               <div class="bg-[#fdf2f8] border border-[#fce7f3] rounded-2xl p-6 text-center shadow-sm">
                  <div class="text-4xl mb-3">🏠</div>
                  <h3 class="text-[17px] font-bold text-red-600 mb-2">ที่พักอาศัยของท่านอาจยังไม่เหมาะกับการติดโซลาร์เซลล์</h3>
                  <p class="text-sm text-gray-600 leading-relaxed">
                     เนื่องจากขณะนี้ไม่พบแพ็กเกจที่ตรงกับขนาดการใช้ไฟและพื้นที่ของท่าน<br>
                     ท่านสามารถติดต่อสอบถามข้อมูลเพิ่มเติมกับเจ้าหน้าที่ได้ที่
                  </p>
                  <div class="mt-4 font-extrabold text-xl" style="color: var(--pea-primary);">
                     📞 1129 PEA Contact Center
                  </div>
               </div>
            </div>
          `;
      } else {
          let onGridPkgs = validPkgs.filter(p => { let t = getVal(p, 'type').toUpperCase(); return t === 'SO' || t.includes('ON'); });
          let batteryPkgs = validPkgs.filter(p => { let t = getVal(p, 'type').toUpperCase(); return t === 'SB' || t === 'SH' || t === 'BB' || t.includes('HYBRID') || t.includes('BAT'); });

          let recPkg = onGridPkgs.length ? (onGridPkgs.find(p => parseNum(getVal(p, 'inverter(kw)')) >= parseFloat(r.kwShow)) || onGridPkgs[onGridPkgs.length-1]) : null;
          let minPkg = onGridPkgs.length ? ([...onGridPkgs].reverse().find(p => parseNum(getVal(p, 'inverter(kw)')) < parseFloat(r.kwShow)) || onGridPkgs[0]) : null;
          let batPkg = batteryPkgs.length ? (batteryPkgs.find(p => parseNum(getVal(p, 'inverter(kw)')) >= parseFloat(r.kwShow)) || batteryPkgs[batteryPkgs.length-1]) : null;

          pkgHtml = `
            <div class="mt-8 mb-4 border-t-2 border-dashed border-gray-200 pt-6">
               <h3 class="text-xl font-bold text-gray-800 mb-2 text-center">🎯 แพ็กเกจที่เหมาะสมกับคุณ</h3>
               <div class="space-y-4">
                  ${minPkg ? renderPkgCard(minPkg, '⚡ ขั้นต่ำที่รองรับได้ (Minimum)', '#6b7280') : ''}
                  ${recPkg ? renderPkgCard(recPkg, '⭐ แนะนำสำหรับคุณ (Recommended)', '#9b2077') : ''}
                  ${batPkg ? renderPkgCard(batPkg, '🔋 ออปชันเสริมมีแบตเตอรี่ (Hybrid)', '#76b72a') : ''}
               </div>
            </div>
          `;

          allPkgsHtml = `
            <button onclick="document.getElementById('all-pkgs-container').classList.toggle('hidden')" class="mt-4 w-full py-2 text-center font-semibold underline text-[14px] transition-colors hover:opacity-80" style="color: var(--pea-primary);">
               คลิกเพื่อดูแพ็กเกจทั้งหมดที่คุณสามารถติดตั้งได้ ⬇️
            </button>
            <div id="all-pkgs-container" class="hidden mt-4 space-y-2 fade p-4 bg-[#fcf9fb] rounded-2xl border border-gray-200">
               <p class="text-[11px] text-gray-500 mb-3 text-center">รายการแพ็กเกจที่เหมาะสมกับพื้นที่และระบบไฟของคุณ</p>
               ${validPkgs.map(p => renderSmallPkgCard(p)).join('')}
            </div>
          `;
      }
  }

  document.getElementById('app').innerHTML=`
    <div class="fade">
      <p class="text-xs text-gray-500 mb-1">ผลประเมินเบื้องต้น</p>
      <h2 class="text-xl font-bold mb-4" style="color: var(--pea-primary);">ขนาดโซลาร์เซลล์ที่คำนวณได้</h2>
      <div class="rounded-2xl p-5 mb-4 border" style="background: linear-gradient(135deg, #fdf2f8, #fce7f3); border-color: var(--pea-border);">
        <div class="flex items-end gap-2">
          <span class="text-5xl font-extrabold" style="color:var(--pea-primary)">${r.kwShow}</span>
          <span class="text-xl font-bold text-gray-600 mb-1">kWp</span>
        </div>
        <p class="text-[13px] text-gray-600 mt-1">≈ ขนาดมาตรฐาน <b>${r.pkg} kW</b> · ตัวจำกัด: ${r.bindWhy}</p>
        <p class="text-sm font-semibold mt-3" style="color:var(--pea-primary)">รูปแบบที่แนะนำ: ${r.type}</p>
        <p class="text-[13px] text-gray-600 mt-1">ประหยัดได้ราว <b>${r.save.toLocaleString()} บาท/เดือน</b> (ประมาณการ)</p>
      </div>
      
      <div class="space-y-2 mb-4">${warnHtml}</div>

      ${pkgHtml}

      ${allPkgsHtml}

      <button onclick="location.reload()" class="w-full text-white font-semibold py-3 mt-4 rounded-xl shadow-md" style="background:var(--pea-primary)">↻ ประเมินใหม่</button>
    </div>`;
}

render('segment');
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ผมเซนเซอร์ข้อมูลเชื่อมต่อฐานข้อมูลไว้ให้ครับ สำคัญมากห้ามนำขึ้น GitHub
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET.firebasestorage.app",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID",
    measurementId: "YOUR_MEASUREMENT_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveToDatabase = async function(resultData) {
    try {
      const docRef = await addDoc(collection(db, "evaluations"), {
        ...resultData,
        timestamp: serverTimestamp()
      });
      console.log("บันทึกข้อมูลเข้า Firebase สำเร็จ! Document ID: ", docRef.id);
    } catch (e) {
      console.error("เกิดข้อผิดพลาดในการบันทึก: ", e);
    }
  };
</script>
</body>
